<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hecuhecu - Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFBFC;
    --text: #1E293B;
    --text-sub: #64748B;
    --card-bg: #FFFFFF;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
    --card-hover: 0 8px 32px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.04);
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'M PLUS Rounded 1c', 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 20px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 0 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-icon {
    font-size: 32px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .header p {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.6;
  }

  .apps {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .app-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    color: inherit;
    transition: box-shadow 0.25s ease, transform 0.25s ease;
  }

  .app-card:hover {
    box-shadow: var(--card-hover);
    transform: translateY(-2px);
  }

  .app-icon {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .app-icon img {
    width: 72px;
    height: 72px;
    border-radius: 16px;
  }

  .app-info {
    flex: 1;
    min-width: 0;
  }

  .app-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .app-tagline {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.5;
  }

  .app-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 6px;
    margin-top: 8px;
  }

  .badge-green { background: #E8F8EF; color: #2D7D5F; }
  .badge-blue { background: #E8F0FE; color: #1A56DB; }
  .badge-orange { background: #FEF3E2; color: #C2750A; }
  .badge-teal { background: #E6F7F5; color: #0F766E; }

  .chevron {
    color: #CBD5E1;
    font-size: 20px;
    flex-shrink: 0;
  }

  .footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid #E2E8F0;
    font-size: 12px;
    color: #94A3B8;
    line-height: 2;
  }

  .footer a {
    color: #64748B;
    text-decoration: none;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  @media (max-width: 480px) {
    .container { padding: 40px 0 60px; }
    .header h1 { font-size: 24px; }
    .app-card { padding: 20px; gap: 16px; }
    .app-icon { width: 60px; height: 60px; }
    .app-icon img { width: 60px; height: 60px; }
    .app-name { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-icon">🛠️</div>
    <h1>hecuhecu</h1>
    <p>個人で開発しているアプリたちです</p>
  </div>

  <div class="apps">
    <a class="app-card" href="https://apps.apple.com/app/id6784841771" target="_blank">
      <div class="app-icon">
        <img src="/apps/color-grab/icon.png" alt="カラーピッカー 色をHEXで採取 - Grab">
      </div>
      <div class="app-info">
        <div class="app-name">カラーピッカー 色をHEXで採取 - Grab</div>
        <div class="app-tagline">カメラをかざすだけで、目の前の色を採取</div>
        <span class="app-badge badge-teal">カメラ × カラーコード</span>
      </div>
      <span class="chevron">›</span>
    </a>

    <a class="app-card" href="https://apps.apple.com/app/id6761958213" target="_blank">
      <div class="app-icon">
        <img src="icon_gamaguchi.png" alt="がまぐち">
      </div>
      <div class="app-info">
        <div class="app-name">がまぐち</div>
        <div class="app-tagline">我慢するたびお金が貯まる節約アプリ</div>
        <span class="app-badge badge-green">節約 × キャラクター</span>
      </div>
      <span class="chevron">›</span>
    </a>

    <a class="app-card" href="https://apps.apple.com/app/id1613885003" target="_blank">
      <div class="app-icon">
        <img src="icon_todo.png" alt="TODOタイマー">
      </div>
      <div class="app-info">
        <div class="app-name">TODOタイマー</div>
        <div class="app-tagline">やることを決めて、集中する</div>
        <span class="app-badge badge-blue">タスク × タイマー</span>
      </div>
      <span class="chevron">›</span>
    </a>

    <a class="app-card" href="https://apps.apple.com/app/id6759416281" target="_blank">
      <div class="app-icon">
        <img src="icon_cocoico.png" alt="ココイコ！">
      </div>
      <div class="app-info">
        <div class="app-name">ココイコ！</div>
        <div class="app-tagline">みんなでスポットを共有するマップアプリ</div>
        <span class="app-badge badge-orange">マップ × 共有</span>
      </div>
      <span class="chevron">›</span>
    </a>
  </div>

  <div class="footer">
    <p><a href="/apps/">規約・サポート</a></p>
    <p>© 2026 hecuhecu</p>
  </div>
</div>
</body>
</html>
